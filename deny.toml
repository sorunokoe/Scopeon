# cargo-deny configuration
#
# Run manually:   cargo deny check
# CI job:         .github/workflows/ci.yml (deny job)
# Install:        cargo install cargo-deny --locked
#
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Targets to check (empty = all targets).
targets = []

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
# Minimum confidence threshold to consider a license detected.
confidence-threshold = 0.8

# List of explicitly allowed licenses. If a crate has a license not in this
# list, cargo-deny will emit an error.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # BSL-1.0: used by clipboard-win and error-code (OSI approved, FSF Free/Libre)
    "BSL-1.0",
    # MPL-2.0: used by option-ext (OSI approved, FSF Free/Libre)
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]

# Exceptions for crates that are under dual/custom licenses accepted on a
# case-by-case basis.
exceptions = []

# ---------------------------------------------------------------------------
# Security advisories
# ---------------------------------------------------------------------------
[advisories]
# Fetch the advisory database from the official RustSec repo.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Error on any vulnerability (warn = print but don't fail).
version = 2

# Unmaintained transitive deps with no safe upgrade path available.
ignore = [
    # instant v0.1.13 via notify-types → notify (RUSTSEC-2024-0384)
    { id = "RUSTSEC-2024-0384", reason = "Unmaintained transitive dep via notify-types → notify; no safe upgrade available" },
    # paste v1.0.15 via ratatui (RUSTSEC-2024-0436)
    { id = "RUSTSEC-2024-0436", reason = "Unmaintained transitive dep via ratatui; no safe upgrade available" },
]

# ---------------------------------------------------------------------------
# Banned crates
# ---------------------------------------------------------------------------
[bans]
# Deny multiple versions of the same crate.
multiple-versions = "warn"

# Deny wildcard (`version = "*"`) dependencies.
# allow-wildcard-paths exempts path-only workspace deps (no version specifier),
# which is the standard workspace pattern and not a true wildcard.
wildcards = "deny"
allow-wildcard-paths = true

# Crates that are explicitly banned (none currently).
deny = []

# Allowed duplicate crates (when semver-incompatible versions co-exist due to
# transitive dependencies we cannot control).
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Source restrictions
# ---------------------------------------------------------------------------
[sources]
# Only allow crates from crates.io and our own workspace paths.
unknown-registry = "deny"
unknown-git = "deny"

allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
